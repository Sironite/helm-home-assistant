suite: networkpolicy
templates:
  - templates/networkpolicy.yaml
release:
  name: home-assistant
  namespace: home-assistant

tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders CiliumNetworkPolicy when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: CiliumNetworkPolicy
      - equal:
          path: metadata.name
          value: home-assistant

  - it: includes prometheus ingress rule when namespace set
    set:
      networkPolicy.enabled: true
      networkPolicy.prometheusNamespace: monitoring
    asserts:
      - contains:
          path: spec.ingress
          content:
            fromEndpoints:
              - matchLabels:
                  k8s:io.kubernetes.pod.namespace: monitoring
                  app.kubernetes.io/name: prometheus
            toPorts:
              - ports:
                  - port: "8123"
                    protocol: TCP

  - it: includes mqtt egress rule when namespace set
    set:
      networkPolicy.enabled: true
      networkPolicy.mqttNamespace: emqx
    asserts:
      - contains:
          path: spec.egress
          content:
            toEndpoints:
              - matchLabels:
                  k8s:io.kubernetes.pod.namespace: emqx
            toPorts:
              - ports:
                  - port: "1883"
                    protocol: TCP
