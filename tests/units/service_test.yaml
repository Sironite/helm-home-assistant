suite: service
templates:
  - templates/service.yaml
release:
  name: home-assistant
  namespace: home-assistant

tests:
  - it: renders ClusterIP service by default
    documentSelector:
      path: metadata.name
      value: home-assistant
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8123

  - it: renders LoadBalancer with annotations
    set:
      service.type: LoadBalancer
      service.loadBalancerIP: 10.0.0.1
      service.annotations:
        io.cilium/lb-ipam-ips: "10.0.0.1"
    documentSelector:
      path: metadata.name
      value: home-assistant
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.loadBalancerIP
          value: 10.0.0.1
      - equal:
          path: metadata.annotations["io.cilium/lb-ipam-ips"]
          value: "10.0.0.1"

  - it: renders codeserver service when addon enabled
    set:
      addons.codeserver.enabled: true
    documentSelector:
      path: metadata.name
      value: home-assistant-codeserver
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 12321

  - it: does not render codeserver service when addon disabled
    asserts:
      - hasDocuments:
          count: 1
