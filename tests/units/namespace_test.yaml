suite: namespace
templates:
  - templates/namespace.yaml
release:
  name: home-assistant
  namespace: home-assistant

tests:
  - it: enforces baseline PSS by default
    asserts:
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: baseline

  - it: enforces privileged PSS when hostNetwork enabled
    set:
      hostNetwork: true
    asserts:
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: privileged

  - it: merges namespaceLabels
    set:
      namespaceLabels:
        gateway.example.com/app-gateway: "true"
    asserts:
      - equal:
          path: metadata.labels["gateway.example.com/app-gateway"]
          value: "true"
      - equal:
          path: metadata.labels["pod-security.kubernetes.io/enforce"]
          value: baseline
