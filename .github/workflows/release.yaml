name: Release Chart

on:
  push:
    tags: ["home-assistant-v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Get chart version
        id: chart
        run: echo "version=$(grep '^version:' Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Package chart
        run: helm package .

      - name: Publish to GitHub Pages
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          CHART_TGZ="home-assistant-${{ steps.chart.outputs.version }}.tgz"
          PAGES_URL="https://sironite.github.io/helm-home-assistant"

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          cp "$CHART_TGZ" /tmp/gh-pages/
          cd /tmp/gh-pages
          helm repo index . --url "$PAGES_URL" --merge index.yaml 2>/dev/null || helm repo index . --url "$PAGES_URL"
          git add .
          git commit -m "Release ${{ steps.chart.outputs.version }}" || echo "Nothing to commit"
          git push origin HEAD:gh-pages

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI chart
        run: |
          helm push "home-assistant-${{ steps.chart.outputs.version }}.tgz" oci://ghcr.io/sironite
