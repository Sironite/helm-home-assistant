name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        helm-version: [v3.21.3, v4.0.4]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm-version }}

      - name: Lint chart
        run: helm lint . -f values.yaml.example

      - name: Check deprecated APIs
        uses: FairwindsOps/pluto/github-action@master
        with:
          helm-chart-path: .
          ignore-deprecations: false
          output: table

  security:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          helm-values: values.yaml.example
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table

  unit-tests:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        helm-version: [v3.21.3, v4.0.4]
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm-version }}

      - name: Install helm-unittest
        run: |
          if [[ "${{ matrix.helm-version }}" == v4* ]]; then
            helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 0.7.1 --verify=false
          else
            helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 0.7.1
          fi

      - name: Run unit tests
        run: helm unittest -f 'tests/units/*_test.yaml' .
