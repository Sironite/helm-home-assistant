{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "home-assistant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "home-assistant.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
{{- if and .Values.addons.codeserver.enabled .Values.addons.codeserver.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "home-assistant.fullname" . }}-codeserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: codeserver
  {{- with .Values.addons.codeserver.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.addons.codeserver.ingress.className }}
  ingressClassName: {{ .Values.addons.codeserver.ingress.className }}
  {{- end }}
  {{- if .Values.addons.codeserver.ingress.tls }}
  tls:
    {{- toYaml .Values.addons.codeserver.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  - host: {{ .Values.addons.codeserver.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "home-assistant.fullname" . }}-codeserver
            port:
              number: {{ .Values.addons.codeserver.service.port }}
{{- end }}
